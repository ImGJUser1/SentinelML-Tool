# .pre-commit-config.yaml
repos:
  - repo: https://github.com/psf/black
    rev: 23.12.1  # Updated to latest stable
    hooks:
      - id: black
        language_version: python3
        args: [--line-length=100]

  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2  # Updated
    hooks:
      - id: isort
        args: [--profile=black, --line-length=100]

  - repo: https://github.com/PyCQA/flake8
    rev: 7.0.0  # Updated
    hooks:
      - id: flake8
        args: [--max-line-length=100, --extend-ignore=E203,W503]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0  # Updated
    hooks:
      - id: mypy
        # REMOVED the problematic types-all
        # ADDED specific type stubs your project might need
        additional_dependencies: [
          'types-requests',
          'types-PyYAML',
          'types-setuptools',
          'types-python-dateutil',
          'types-toml',
        ]
        args: [
          --ignore-missing-imports,
          --no-strict-optional,
          --warn-no-return,
          --warn-redundant-casts,
          --warn-unused-ignores
        ]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0  # Updated
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-json
      - id: check-toml
      - id: debug-statements
      - id: check-merge-conflict  # Added this useful hook
      - id: detect-private-key   # Added security hook
